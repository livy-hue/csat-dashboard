const INTENT_COLORS = {
  "service__info__do_you_provide_this_service":"#185FA5",
  "order__new__quote_request":"#185FA5","order__new__place":"#185FA5",
  "order__cancellation__cancel":"#0F6E56","order__wrong_product__missing_item":"#0F6E56",
  "misc__contact__talk_to_agent_over_phone":"#993C1D","misc__feedback__complaint":"#993C1D",
  "billing__wrong__charge":"#534AB7","billing__wrong__why_charged":"#534AB7",
  "billing__refund__request":"#534AB7","billing__checkout__issue":"#534AB7",
};

let chartService=null, chartMonth=null;

function renderMetrics(t,tr,sol,neg) {
  document.getElementById("mTotal").textContent = t.toLocaleString();
  document.getElementById("mTotalSub").textContent = "張工單";
  document.getElementById("mTransfer").textContent = t>0?Math.round(tr/t*100)+"%":"-%";
  document.getElementById("mTransferSub").textContent = tr.toLocaleString()+" 張需真人";
  document.getElementById("mSolved").textContent = t>0?Math.round(sol/t*100)+"%":"-%";
  document.getElementById("mSolvedSub").textContent = sol.toLocaleString()+" 張自行解決";
  document.getElementById("mNeg").textContent = t>0?Math.round(neg/t*100)+"%":"-%";
  document.getElementById("fCount").textContent = "共 "+t.toLocaleString()+" 筆";
}

function renderIntentList(data) {
  const max = Math.max(...data.map(d=>d.n),1);
  document.getElementById("intentList").innerHTML = data.slice(0,12).map(d=>{
    const rc = d.rate>=65?"rate-h":d.rate>=45?"rate-m":"rate-l";
    const bc = INTENT_COLORS[d.key]||"#888";
    return `<div class="intent-row"><span class="intent-label" title="${d.label}">${d.label}</span><div class="bar-wrap"><div class="bar" style="width:${Math.round(d.n/max*100)}%;background:${bc}"></div></div><span class="cnt">${d.n}</span><span class="rate ${rc}">${d.rate}%</span></div>`;
  }).join("");
}

function renderCharts(svcData, monthLabels, monthCounts) {
  if(chartService) chartService.destroy();
  chartService = new Chart(document.getElementById("cService"),{type:"doughnut",data:{labels:Object.keys(svcData),datasets:[{data:Object.values(svcData),backgroundColor:["#185FA5","#0F6E56","#888"],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{font:{size:11},boxWidth:10}}}}});
  if(chartMonth) chartMonth.destroy();
  chartMonth = new Chart(document.getElementById("cMonth"),{type:"line",data:{labels:monthLabels,datasets:[{data:monthCounts,borderColor:"#185FA5",backgroundColor:"rgba(24,95,165,0.08)",tension:0.3,fill:true,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}}}}}});
}

function buildTabs() {
  const tabsEl = document.getElementById("tabs");
  const contentsEl = document.getElementById("tabContents");
  DATA.top5_keys.forEach((k,i) => {
    const ia = DATA.intent_analysis[k];
    if(!ia) return;
    const tab = document.createElement("div");
    tab.className = "tab" + (i===0?" active":"");
    tab.textContent = ia.label + " (" + ia.n + "張)";
    tab.onclick = () => {
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("tc-"+k).classList.add("active");
    };
    tabsEl.appendChild(tab);
    const content = document.createElement("div");
    content.className = "tab-content" + (i===0?" active":"");
    content.id = "tc-"+k;
    const examplesHtml = ia.examples.slice(0,2).map(ex => {
      const rows = ex.map(m => {
        const isBot = m.s==="bot";
        const cls = isBot && (m.c.includes("預收款") || m.c.includes("門市日租") || m.c.includes("取車")) ? "wrong" : "";
        return `<div class="chat-row"><span class="chat-who ${isBot?"chat-b":"chat-u"}">${m.s==="bot"?"bot":"客人"}</span><span class="chat-msg ${cls}">${m.c}</span></div>`;
      }).join("");
      return `<div class="chat-ex">${rows}</div>`;
    }).join("");
    content.innerHTML = `
      <div class="stats-row">
        <div class="stat-item"><strong>${ia.n.toLocaleString()}</strong>總工單</div>
        <div class="stat-item"><strong style="color:#c0392b">${ia.transfer_rate}%</strong>轉人工率</div>
        <div class="stat-item"><strong style="color:#1e8449">${ia.solved}</strong>自行解決</div>
      </div>
      <div class="detail-grid">
        <div class="detail-box">
          <h3>客人開場詞 Top 12</h3>
          <div class="kw-list">${ia.top_msgs.map(([k,v])=>`<div class="kw-item"><span class="kw-text" title="${k}">${k}</span><span class="kw-cnt">${v}次</span></div>`).join("")}</div>
        </div>
        <div class="detail-box">
          <h3>Bot 第一則回覆（前4種）</h3>
          <div class="kw-list">${ia.top_bot.map(([k,v])=>`<div class="kw-item"><span class="kw-text" title="${k}">${k}</span><span class="kw-cnt">${v}次</span></div>`).join("")}</div>
        </div>
        <div class="detail-box">
          <h3>轉人工後客人補充說</h3>
          <div class="kw-list">${ia.top_followup.map(([k,v])=>`<div class="kw-item"><span class="kw-text" title="${k}">${k}</span><span class="kw-cnt">${v}次</span></div>`).join("")}</div>
        </div>
      </div>
      <div class="examples"><h3>典型轉人工對話範例</h3>${examplesHtml}</div>`;
    contentsEl.appendChild(content);
  });
}

function render() {
  const month = document.getElementById("fMonth").value;
  const service = document.getElementById("fService").value;
  let filtered = DATA;
  renderMetrics(DATA.total, DATA.transfer, DATA.solved, DATA.neg);
  renderIntentList(DATA.intent_data);
  renderCharts(DATA.services, DATA.months, DATA.month_counts);
}

buildTabs();
render();
document.getElementById("fMonth").addEventListener("change", render);
document.getElementById("fService").addEventListener("change", render);
</script>
